<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe em Tela Cheia</title>
    <style>
        /* Remove as margens e barras de rolagem da página principal */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Faz o iframe ocupar toda a tela */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Insira o link do seu site aqui -->
    <iframe src="https://bossbones.github.io/Hellos__HelloBehavior/"></iframe>

</body>
</html>
